<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Authorization Consent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .consent-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            padding: 2rem;
            max-width: 440px;
            width: 100%;
        }
        .consent-card h1 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }
        .client-name {
            color: #2563eb;
            font-weight: 600;
        }
        .description {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .scope-list {
            list-style: none;
            margin-bottom: 1.5rem;
        }
        .scope-item {
            padding: 0.75rem 0;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
        }
        .scope-item:last-child { border-bottom: none; }
        .scope-item input[type="checkbox"] {
            margin-top: 0.2rem;
            width: 18px;
            height: 18px;
        }
        .scope-item label {
            flex: 1;
        }
        .scope-name {
            font-weight: 500;
            font-size: 0.95rem;
        }
        .scope-desc {
            color: #888;
            font-size: 0.8rem;
            margin-top: 0.15rem;
        }
        .actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .btn {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-approve {
            background: #2563eb;
            color: #fff;
        }
        .btn-approve:hover { background: #1d4ed8; }
        .btn-deny {
            background: #e5e7eb;
            color: #333;
        }
        .btn-deny:hover { background: #d1d5db; }
        .user-info {
            text-align: center;
            color: #888;
            font-size: 0.8rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
<div class="consent-card">
    <h1>Authorization Request</h1>
    <p class="description">
        <span class="client-name" th:text="${clientName}">Client App</span>
        is requesting the following permissions:
    </p>

    <form th:action="@{/oauth2/authorize}" method="post">
        <input type="hidden" name="client_id" th:value="${clientId}"/>
        <input type="hidden" name="state" th:value="${state}"/>

        <ul class="scope-list">
            <li class="scope-item" th:each="scopeDef : ${scopeDefinitions}">
                <input type="checkbox"
                       th:id="${scopeDef.scope}"
                       th:name="scope"
                       th:value="${scopeDef.scope}"
                       checked="checked"/>
                <label th:for="${scopeDef.scope}">
                    <div class="scope-name" th:text="${scopeDef.scope}">scope</div>
                    <div class="scope-desc" th:text="${scopeDef.descriptionKo}">description</div>
                    <div class="scope-desc" th:text="${scopeDef.descriptionEn}">description en</div>
                </label>
            </li>
            <!-- Show scopes that don't have definitions -->
            <li class="scope-item" th:each="s : ${scopes}" th:if="${scopeDefinitions == null or !#lists.contains(scopeDefinitions.![scope], s)}">
                <input type="checkbox"
                       th:id="${s}"
                       th:name="scope"
                       th:value="${s}"
                       checked="checked"/>
                <label th:for="${s}">
                    <div class="scope-name" th:text="${s}">scope</div>
                </label>
            </li>
        </ul>

        <div class="actions">
            <button type="submit" class="btn btn-approve" name="consent_action" value="approve">Approve</button>
            <button type="submit" class="btn btn-deny" name="consent_action" value="deny">Deny</button>
        </div>
    </form>

    <div class="user-info">
        Logged in as <span th:text="${principalName}">user</span>
    </div>
</div>
</body>
</html>
