spring:
  application:
    name: sonature-auth

  profiles:
    active: dev

  datasource:
    url: jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:google-client-id-placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:google-client-secret-placeholder}
            scope: openid, profile, email
          github:
            client-id: ${GITHUB_CLIENT_ID:github-client-id-placeholder}
            client-secret: ${GITHUB_CLIENT_SECRET:github-client-secret-placeholder}
            scope: read:user, user:email
          kakao:
            client-id: ${KAKAO_CLIENT_ID:kakao-client-id-placeholder}
            client-secret: ${KAKAO_CLIENT_SECRET:kakao-client-secret-placeholder}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-authentication-method: client_secret_post
            scope: profile_nickname, account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

server:
  port: 8080

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-change-in-production}
  access-token-expiration: 900000      # 15 minutes in milliseconds
  refresh-token-expiration: 604800000  # 7 days in milliseconds

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# Crypto Keys
crypto:
  keys:
    hs256-secret: ${JWT_HS256_SECRET:dGVzdC1zZWNyZXQta2V5LWZvci1kZXZlbG9wbWVudC0zMmJ5dGVz}
    rs256-private-key: ${JWT_RS256_PRIVATE_KEY:}
    rs256-public-key: ${JWT_RS256_PUBLIC_KEY:}
    paseto-secret-key: ${PASETO_SECRET_KEY:}
    paseto-private-key: ${PASETO_PRIVATE_KEY:}
    paseto-public-key: ${PASETO_PUBLIC_KEY:}

# Logging
logging:
  level:
    root: INFO
    com.sonature.auth: DEBUG
    org.springframework.security: DEBUG
